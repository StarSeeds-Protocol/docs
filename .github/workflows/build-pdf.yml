name: Build PDF

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system libraries for WeasyPrint
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build PDF
        run: python3 scripts/build_pdf.py

      - name: Double-check PDF content
        run: python3 scripts/check_pdf.py

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-pdf
          path: build/docs.pdf
